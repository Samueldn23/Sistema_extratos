<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste de Botões</title>
</head>
<body>
    <h1>Teste de Autenticação</h1>
    <p>Abra o console do navegador (F12) e veja se há erros</p>

    <iframe src="http://localhost:3000" style="width: 100%; height: 80vh; border: 1px solid #ccc;"></iframe>

    <h2>Status da Página</h2>
    <div id="status"></div>

    <script>
        // Teste simples
        window.addEventListener('load', () => {
            document.getElementById('status').textContent = 'Página carregada em ' + new Date().toLocaleTimeString();
        });
    </script>
</body>
</html>
